name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build:plugin
      - name: Smoke test --validate
        run: |
          node scripts/skill-matcher.js --validate SKILL.md
          node scripts/skill-matcher.js --validate package.json && exit 1 || true
