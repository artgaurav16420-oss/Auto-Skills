name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test
      - run: npm run test:coverage
      - run: npm run lint
      - run: npm run build:plugin
      - name: Smoke test benchmark
        run: |
          npm run benchmark
      - name: Smoke test --validate
        run: |
          node scripts/skill-matcher.js --validate SKILL.md
          node scripts/skill-matcher.js --validate package.json && exit 1 || true
      - name: Smoke test --semantic
        env:
          SKILLS_JSON: '[{"name":"test","description":"debugging skill"}]'
        run: |
          timeout 30 node scripts/skill-matcher.js --semantic "test task" && echo "OK" || echo "SKIP (model download may fail)"
      - name: Smoke test --rerank
        env:
          SKILLS_JSON: '[{"name":"test","description":"debugging skill"}]'
        run: |
          node scripts/skill-matcher.js --rerank "test task" && echo "OK"
